name: Build Executables
on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_path: dist/*.exe
          - os: macos-latest
            artifact_path: dist/*.dmg
          - os: ubuntu-latest
            # PyInstaller on Linux usually produces a file with no extension
            artifact_path: dist/PyTif
    
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Build with PyInstaller
        run: uv run pyinstaller PyTif.spec
      - name: Create DMG (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          uv pip install dmgbuild
          uv run dmgbuild -s .github/workflows/dmg_settings.py "PyTif" dist/PyTif.dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: PyTIF-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}